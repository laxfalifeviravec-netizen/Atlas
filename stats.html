<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — Drive Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="stats.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Atlas</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#features">Features</a></li>
        <li><a href="index.html#explore">Explore</a></li>
        <li><a href="map.html">All Roads</a></li>
        <li><a href="community.html">Community</a></li>
        <li><a href="stats.html" class="active">Drive Stats</a></li>
        <li><a href="pricing.html">Pricing</a></li>
      </ul>
      <div class="nav-auth">
        <button class="btn btn-primary btn-sm" id="authBtn">Sign In</button>
        <div class="user-menu hidden" id="userMenu">
          <span class="user-email" id="userEmail"></span>
          <button class="btn btn-secondary btn-sm" id="logoutBtn">Sign Out</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <header class="stats-hero">
    <div class="stats-hero-inner">
      <h1 class="stats-hero-title">Drive Stats</h1>
      <p class="stats-hero-sub">Your road diary at a glance — every mile, every road, every region</p>
    </div>
  </header>

  <!-- Main content -->
  <div class="stats-container">

    <!-- Top stat cards -->
    <div class="stats-top-cards" id="topCards"></div>

    <!-- Overall progress -->
    <section class="stats-section" id="overallSection"></section>

    <!-- Region + Type breakdown side by side -->
    <div class="stats-two-col">
      <section class="stats-section" id="regionSection"></section>
      <section class="stats-section" id="typeSection"></section>
    </div>

    <!-- Drive Log -->
    <section class="stats-section" id="logSection"></section>

    <!-- Bucket List -->
    <section class="stats-section" id="bucketSection"></section>

  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authOverlay" role="dialog" aria-modal="true">
    <div class="modal auth-modal">
      <div class="modal-header">
        <h3 id="authModalTitle">Welcome to Atlas</h3>
        <button class="modal-close" id="authClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="signup">Create Account</button>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" placeholder="••••••••" required />
          </div>
          <p class="auth-error" id="loginError"></p>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <form id="signupForm" class="hidden">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" name="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" name="password" placeholder="Minimum 8 characters" required />
          </div>
          <p class="auth-error" id="signupError"></p>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="roads-data.js"></script>
  <script src="stats.js"></script>
  <script src="auth.js"></script>
  <script src="mobile-nav.js"></script>
</body>
</html>
