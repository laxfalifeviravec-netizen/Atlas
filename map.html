<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — All Roads Map</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="map-page.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="map-page">
  <!-- Navigation -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Atlas</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#features">Features</a></li>
        <li><a href="index.html#explore">Explore</a></li>
        <li><a href="map.html" class="active">All Roads</a></li>
        <li><a href="pricing.html">Pricing</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <div class="nav-auth">
        <button class="btn btn-primary btn-sm" id="authBtn">Sign In</button>
        <div class="user-menu hidden" id="userMenu">
          <span class="user-email" id="userEmail"></span>
          <button class="btn btn-secondary btn-sm" id="logoutBtn">Sign Out</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Map layout -->
  <div class="map-layout">

    <!-- Sidebar -->
    <aside class="map-sidebar" id="mapSidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <h2>All Roads</h2>
          <span class="road-count" id="roadCount">45 roads</span>
        </div>
        <button class="sidebar-close" id="sidebarClose" aria-label="Close sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Search -->
      <div class="sidebar-search">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="sidebarSearch" placeholder="Search roads..." autocomplete="off" aria-label="Search roads" />
        <button class="search-clear" id="searchClear" aria-label="Clear search" style="display:none">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <!-- Region filter -->
      <div class="sidebar-filters">
        <div class="filter-group">
          <label class="filter-label">Region</label>
          <div class="filter-chips" id="regionFilter">
            <button class="chip active" data-value="">All</button>
            <button class="chip" data-value="West Coast">West</button>
            <button class="chip" data-value="Mountain West">Mountain</button>
            <button class="chip" data-value="Southwest">SW</button>
            <button class="chip" data-value="Southeast">SE</button>
            <button class="chip" data-value="Northeast">NE</button>
            <button class="chip" data-value="Midwest">Midwest</button>
          </div>
        </div>
        <div class="filter-group">
          <label class="filter-label">Type</label>
          <div class="filter-chips" id="typeFilter">
            <button class="chip active" data-value="">All</button>
            <button class="chip" data-value="Mountain">Mountain</button>
            <button class="chip" data-value="Coastal">Coastal</button>
            <button class="chip" data-value="Technical">Technical</button>
            <button class="chip" data-value="Scenic">Scenic</button>
            <button class="chip" data-value="Desert">Desert</button>
            <button class="chip" data-value="Historic">Historic</button>
          </div>
        </div>
      </div>

      <!-- Type legend -->
      <div class="type-legend">
        <div class="legend-item"><span class="legend-dot" style="background:#f97316"></span>Mountain</div>
        <div class="legend-item"><span class="legend-dot" style="background:#0ea5e9"></span>Coastal</div>
        <div class="legend-item"><span class="legend-dot" style="background:#ef4444"></span>Technical</div>
        <div class="legend-item"><span class="legend-dot" style="background:#22c55e"></span>Scenic</div>
        <div class="legend-item"><span class="legend-dot" style="background:#eab308"></span>Desert</div>
        <div class="legend-item"><span class="legend-dot" style="background:#a855f7"></span>Historic</div>
        <div class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>Canyon</div>
        <div class="legend-item"><span class="legend-dot" style="background:#6b7280"></span>Off-road</div>
      </div>

      <!-- Road list -->
      <div class="road-list" id="roadList">
        <!-- Populated by JS -->
      </div>
    </aside>

    <!-- Map -->
    <div class="map-main">
      <div id="fullMap"></div>

      <!-- Floating controls -->
      <button class="map-sidebar-toggle" id="sidebarToggle" aria-label="Toggle road list">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <span>Roads</span>
      </button>

      <div class="map-stats-bar" id="mapStatsBar">
        <span id="visibleCount">45 roads shown</span>
        <button class="reset-filters-btn" id="resetFilters" style="display:none">Reset filters</button>
      </div>
    </div>

  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authOverlay" role="dialog" aria-modal="true" aria-labelledby="authModalTitle">
    <div class="modal auth-modal">
      <div class="modal-header">
        <h3 id="authModalTitle">Welcome to Atlas</h3>
        <button class="modal-close" id="authClose" aria-label="Close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="signup">Create Account</button>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="password" placeholder="••••••••" required />
          </div>
          <p class="auth-error" id="loginError"></p>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <form id="signupForm" class="hidden">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" name="name" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" name="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" name="password" placeholder="Minimum 8 characters" required />
          </div>
          <p class="auth-error" id="signupError"></p>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLI=" crossorigin=""></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="map.js"></script>
  <script src="auth.js"></script>
</body>
</html>
