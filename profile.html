<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="community.css" />
  <link rel="stylesheet" href="profile.css" />
</head>
<body>

  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">Atlas</a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html#features">Features</a></li>
        <li><a href="index.html#explore">Explore</a></li>
        <li><a href="map.html">All Roads</a></li>
        <li><a href="community.html" class="active">Community</a></li>
        <li><a href="pricing.html">Pricing</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <div class="nav-auth">
        <button class="btn btn-primary btn-sm" id="authBtn">Sign In</button>
        <div class="user-menu hidden" id="userMenu">
          <span class="user-email" id="userEmail"></span>
          <button class="btn btn-secondary btn-sm" id="logoutBtn">Sign Out</button>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <!-- Profile header -->
  <div class="profile-hero">
    <div class="profile-hero-inner">
      <div class="profile-avatar-wrap">
        <div class="profile-avatar" id="profileAvatar"></div>
        <button class="profile-avatar-edit hidden" id="avatarEditBtn" title="Change photo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      </div>
      <div class="profile-info">
        <h1 class="profile-name" id="profileName">Loading…</h1>
        <div class="profile-meta" id="profileMeta"></div>
        <div class="profile-stats" id="profileStats"></div>
      </div>
      <div class="profile-actions" id="profileActions"></div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="comm-tabbar">
    <button class="comm-tab active" data-tab="posts">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Posts
    </button>
    <button class="comm-tab" data-tab="garage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
        <path d="M5 17H3a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v9a2 2 0 0 1-2 2h-3"/>
        <circle cx="7.5" cy="17.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/>
      </svg>
      Garage
    </button>
    <button class="comm-tab" data-tab="groups">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
      Groups
    </button>
  </div>

  <!-- Content -->
  <div class="profile-content">

    <!-- Posts grid -->
    <div class="comm-panel active" id="panelPosts">
      <div class="profile-posts-grid" id="profilePostsGrid">
        <div class="feed-loading"><div class="feed-loading-spin"></div>Loading…</div>
      </div>
    </div>

    <!-- Garage -->
    <div class="comm-panel" id="panelGarage">
      <div class="garage-grid" id="profileGarageGrid">
        <div class="feed-loading"><div class="feed-loading-spin"></div>Loading…</div>
      </div>
    </div>

    <!-- Groups -->
    <div class="comm-panel" id="panelGroups">
      <div class="groups-grid" id="profileGroupsGrid">
        <div class="feed-loading"><div class="feed-loading-spin"></div>Loading…</div>
      </div>
    </div>

  </div>

  <!-- Post lightbox -->
  <div class="modal-overlay" id="lightboxOverlay" role="dialog" aria-modal="true">
    <div class="modal post-detail-modal">
      <div class="modal-header">
        <h3 id="lightboxTitle">Post</h3>
        <button class="modal-close" id="lightboxClose">&times;</button>
      </div>
      <div class="modal-body post-detail-body">
        <div class="post-detail-image-wrap">
          <img id="lightboxImage" src="" alt="" />
        </div>
        <div class="post-detail-side">
          <div class="post-detail-info" id="lightboxInfo"></div>
          <div class="post-detail-comments" id="lightboxComments"></div>
          <form class="comment-form" id="lightboxCommentForm">
            <input type="text" id="lightboxCommentInput" placeholder="Add a comment…" maxlength="300" autocomplete="off" />
            <button type="submit" class="comment-submit-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="authOverlay" role="dialog" aria-modal="true">
    <div class="modal auth-modal">
      <div class="modal-header">
        <h3>Welcome to Atlas</h3>
        <button class="modal-close" id="authClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="signup">Create Account</button>
        </div>
        <form id="loginForm">
          <div class="form-group">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required />
          </div>
          <p class="auth-error" id="loginError"></p>
          <button type="submit" class="btn btn-primary btn-full">Sign In</button>
        </form>
        <form id="signupForm" class="hidden">
          <div class="form-group">
            <label for="signupName">Full Name</label>
            <input type="text" id="signupName" placeholder="Your name" required />
          </div>
          <div class="form-group">
            <label for="signupEmail">Email</label>
            <input type="email" id="signupEmail" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" placeholder="Minimum 8 characters" required />
          </div>
          <p class="auth-error" id="signupError"></p>
          <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="db.js"></script>
  <script src="profile.js"></script>
  <script src="auth.js"></script>
  <script src="notifications.js"></script>
</body>
</html>
